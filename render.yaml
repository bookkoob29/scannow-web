# SCANNOW — Production Deployment (Render)
#
# Steps:
# 1. Push code to GitHub repo
# 2. Create "Web Service" on Render from that repo
# 3. Set:
#    - Build Command: pip install -r requirements.txt
#    - Start Command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app:app
#    - Health Check Path: /api/health
# 4. Add Environment Variables (see below)
# 5. Add a PostgreSQL database (Render free tier)
# 6. Deploy!
#
# Required Env Vars:
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...
#   GOOGLE_REDIRECT_URI=https://scannow.onrender.com/auth/callback
#   SESSION_SECRET=...
#   INGEST_API_KEY=...  (shared with local cron)
#   DATABASE_URL=...    (auto-provided by Render Postgres)
#   TELEGRAM_BOT_TOKEN=...
#   TELEGRAM_CHAT_ID=8969930460

services:
  - type: web
    name: scannow
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app:app
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: INGEST_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "8969930460"
      - key: DATABASE_URL
        fromDatabase:
          name: scannow-db
          property: connectionString

databases:
  - name: scannow-db
    plan: free
